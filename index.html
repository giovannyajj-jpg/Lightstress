<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LightStress | Tienda Oficial</title>
<meta name="description" content="LightStress — Survival para Minecraft pe 0.15.X. Rangos, kits y comunidad.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
  :root{
    --void:#060911;
    --panel:#10151e;
    --panel-2:#141b27;
    --edge:#1d2632;
    --volt:#39e1ff;
    --volt-deep:#1463ff;
    --amber:#ffb627;
    --text:#dce6f0;
    --text-dim:#6e7e91;
    --radius:16px;
    --radius-sm:10px;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html{scroll-behavior:smooth;}

  body{
    background:
      radial-gradient(ellipse 800px 500px at 8% -10%, rgba(15,45,110,0.16), transparent 60%),
      radial-gradient(ellipse 700px 480px at 100% 10%, rgba(57,225,255,0.05), transparent 58%),
      radial-gradient(ellipse 900px 560px at 50% 120%, rgba(8,30,80,0.14), transparent 62%),
      linear-gradient(180deg, #010203 0%, #02040a 45%, #03060d 100%);
    color:var(--text);
    font-family:'Rajdhani',sans-serif;
    font-weight:500;
    overflow-x:hidden;
  }

  ::selection{ background:var(--volt); color:#04141a; }

  h1,h2,h3{ font-family:'Chakra Petch',sans-serif; letter-spacing:0.02em; }

  a{ color:inherit; }

  :focus-visible{
    outline:2px solid var(--volt);
    outline-offset:3px;
  }

  .mono{ font-family:'JetBrains Mono',monospace; }

  /* --- VOLTAGE LINE (Optimizado sin desbordamiento) --- */
  .volt-line{
    position:relative;
    height:2px;
    width:100%;
    background:linear-gradient(90deg, transparent, var(--edge) 15%, var(--edge) 85%, transparent);
    overflow:hidden;
    margin:0;
  }
  .volt-line::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100px;
    height:2px;
    background:linear-gradient(90deg, transparent, rgba(255,182,39,0.6), transparent);
    will-change:transform;
    transform:translateX(-100px);
    animation:current-flow 6s linear infinite 1s;
  }
  .volt-line::after{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:150px;
    height:2px;
    background:linear-gradient(90deg, transparent, var(--volt), transparent);
    will-change:transform;
    transform:translateX(-150px);
    animation:current-flow 4s linear infinite;
  }
  @keyframes current-flow{
    0%{ transform:translateX(-150px); }
    100%{ transform:translateX(100vw); }
  }

  /* --- HEADER --- */
  header{
    background:rgba(6,9,15,0.96);
    border-bottom:1px solid var(--edge);
    position:sticky;
    top:0;
    z-index:1000;
  }

  .nav-container{
    max-width:1180px;
    margin:0 auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 24px;
    position:relative;
  }

  .logo{
    font-family:'Chakra Petch',sans-serif;
    font-size:1.15rem;
    font-weight:700;
    color:var(--text);
    display:flex;
    align-items:center;
    gap:10px;
    letter-spacing:0.04em;
  }

  .logo i{
    color:var(--volt);
    text-shadow:0 0 8px rgba(57,225,255,0.6);
    will-change:transform;
    animation:icon-breathe 3s ease-in-out infinite;
  }
  @keyframes icon-breathe{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.1); }
  }

  .menu-toggle{
    display:none;
    background:none;
    border:1px solid var(--edge);
    border-radius:var(--radius-sm);
    color:var(--text);
    font-size:1.1rem;
    width:40px;
    height:40px;
    cursor:pointer;
    transition:border-color 0.25s, color 0.25s, transform 0.25s;
  }
  .menu-toggle:hover{ border-color:var(--volt); color:var(--volt); transform:translateY(-1px); }
  .menu-toggle:active{ transform:scale(0.92); }

  nav ul{
    display:flex;
    list-style:none;
    gap:6px;
  }

  nav a{
    text-decoration:none;
    font-family:'JetBrains Mono',monospace;
    font-size:0.95rem;
    font-weight:600;
    letter-spacing:0.02em;
    color:var(--text-dim);
    padding:8px 14px;
    position:relative;
    display:inline-block;
    border-radius:8px;
    transition:color 0.25s, transform 0.25s;
  }

  nav a:hover{ color:var(--text); transform:translateY(-2px); }

  nav a::before{
    content:"/";
    color:var(--text-dim);
    opacity:0.6;
    transition:color 0.25s, opacity 0.25s;
  }
  nav a.active::before, nav a:hover::before{ color:var(--volt); opacity:1; }

  nav a::after{
    content:"";
    position:absolute;
    left:14px;
    right:14px;
    bottom:2px;
    height:2px;
    background:var(--volt);
    transform:scaleX(0);
    transform-origin:left;
    transition:transform 0.3s ease;
  }

  nav a.active{ color:var(--volt); }
  nav a.active::after{ transform:scaleX(1); }

  /* --- HERO --- */
  .hero{
    text-align:center;
    padding:90px 20px 60px;
    position:relative;
  }

  @keyframes hero-in{
    from{ opacity:0; transform:translateY(12px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .hero .badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-family:'JetBrains Mono',monospace;
    font-size:0.78rem;
    color:var(--volt);
    border:1px solid rgba(57,225,255,0.35);
    background:rgba(57,225,255,0.06);
    padding:6px 14px;
    border-radius:999px;
    margin-bottom:22px;
    letter-spacing:0.05em;
    animation:hero-in 0.5s ease both;
  }

  .hero h1{
    font-size:3.2rem;
    font-weight:700;
    color:#fff;
    margin-bottom:16px;
    text-shadow:0 2px 10px rgba(0,0,0,0.5);
    line-height:1.05;
    animation:hero-in 0.5s 0.08s ease both;
  }

  .hero h1 span{
    position:relative;
    color:var(--volt);
    display:inline-block;
  }
  
  /* Corregido: Brillo estático optimizado mediante opacidad, eliminando filtros de desenfoque dinámicos que causaban vibración */
  .hero h1 span::after{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(57,225,255,0.15);
    z-index:-1;
    border-radius:8px;
    pointer-events:none;
    box-shadow: 0 0 20px rgba(57,225,255,0.4);
    will-change:opacity;
    animation:glow-pulse 3s ease-in-out infinite;
  }
  @keyframes glow-pulse{
    0%,100%{ opacity:0.4; }
    50%{ opacity:0.9; }
  }

  .hero p{
    font-size:1.25rem;
    color:var(--text-dim);
    margin-bottom:34px;
    font-weight:600;
    max-width:560px;
    margin-inline:auto;
    animation:hero-in 0.5s 0.15s ease both;
  }

  .cursor{
    display:inline-block;
    width:9px;
    height:1.1em;
    background:var(--volt);
    margin-left:6px;
    vertical-align:middle;
    animation:blink 1s steps(1) infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }

  .ip-readout{
    position:relative;
    display:inline-flex;
    align-items:center;
    gap:14px;
    background:var(--panel);
    border:1px solid var(--edge);
    padding:14px 10px 14px 22px;
    border-radius:var(--radius);
    box-shadow: 0 10px 30px -10px rgba(0,0,0,0.6);
    animation:hero-in 0.5s 0.22s ease both;
  }

  .ip-readout .label{
    font-family:'JetBrains Mono',monospace;
    font-size:0.72rem;
    color:var(--text-dim);
    text-transform:uppercase;
    letter-spacing:0.08em;
  }

  .ip-readout .value{
    font-family:'JetBrains Mono',monospace;
    font-size:1.15rem;
    font-weight:700;
    color:var(--volt);
  }

  .copy-btn{
    background:var(--panel-2);
    border:1px solid var(--edge);
    color:var(--text-dim);
    width:38px;
    height:38px;
    border-radius:var(--radius-sm);
    cursor:pointer;
    transition:color 0.25s, border-color 0.25s, transform 0.25s;
    font-size:0.9rem;
  }
  .copy-btn:hover{ color:var(--volt); border-color:var(--volt); transform:translateY(-1px); }
  .copy-btn.copied{ color:#0b1a14; background:var(--volt); border-color:var(--volt); animation:copy-pop 0.3s ease; }
  @keyframes copy-pop{
    0%, 100%{ transform:scale(1); }
    50%{ transform:scale(1.1); }
  }

  /* --- LAYOUT --- */
  .container{
    max-width:1180px;
    margin:0 auto;
    padding:60px 20px;
  }

  section{ display:none; }
  section.active-section{
    display:block;
    animation:rise 0.4s ease both;
  }
  @keyframes rise{
    from{ opacity:0; transform:translateY(12px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .section-head{
    text-align:center;
    margin-bottom:44px;
  }

  .section-title{
    font-size:1.7rem;
    font-weight:700;
    color:#fff;
    display:inline-flex;
    align-items:center;
    gap:10px;
    position:relative;
    padding-bottom:12px;
  }

  .section-title::before{
    content:"$";
    font-family:'JetBrains Mono',monospace;
    color:var(--volt);
    font-weight:700;
  }

  .section-title::after{
    content:"";
    position:absolute;
    left:50%;
    bottom:0;
    width:54px;
    height:2px;
    background:var(--volt);
    transform:translateX(-50%);
  }

  /* --- GRID / CARDS --- */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(270px, 1fr));
    gap:26px;
    margin-bottom:64px;
  }
  .grid:last-child{ margin-bottom:0; }

  .card{
    background:var(--panel);
    border:1px solid var(--edge);
    border-radius:var(--radius);
    padding:30px 26px;
    text-align:center;
    position:relative;
    transition:transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1), border-color 0.25s, box-shadow 0.25s;
    backface-visibility:hidden;
    transform:translateZ(0);
  }

  .card:hover{
    transform:translateY(-5px);
    border-color:rgba(57,225,255,0.4);
    box-shadow:0 12px 30px rgba(0,0,0,0.6);
  }

  /* Corregido: Modificada la animación de respiración para que use opacidad de borde en lugar de escalado, evitando que la cuadrícula tiemble */
  .card.featured{
    border-color:rgba(57,225,255,0.5);
    box-shadow:0 0 15px rgba(57,225,255,0.15);
    will-change:border-color;
    animation:featured-breathe 2.5s ease-in-out infinite;
  }
  @keyframes featured-breathe{
    0%,100%{ border-color:rgba(57,225,255,0.3); }
    50%{ border-color:rgba(57,225,255,0.8); }
  }
  .card.featured:hover{ animation-play-state:paused; border-color:var(--volt); }

  .card h3{
    font-size:1.5rem;
    color:#fff;
    margin-bottom:14px;
    letter-spacing:0.03em;
  }

  .card .price{
    font-family:'JetBrains Mono',monospace;
    font-size:1.9rem;
    color:var(--volt);
    font-weight:700;
    margin-bottom:22px;
  }
  .card .price small{
    font-family:'Rajdhani',sans-serif;
    font-size:0.95rem;
    color:var(--text-dim);
    font-weight:600;
  }

  .card ul{
    list-style:none;
    text-align:left;
    margin-bottom:26px;
    font-size:1.05rem;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .card ul li{
    display:flex;
    align-items:flex-start;
    gap:10px;
    color:var(--text);
  }
  .card ul li i{ color:var(--volt); margin-top:3px; font-size:0.85rem; }

  .card.centered ul{ text-align:center; }
  .card.centered ul li{ justify-content:center; }

  .btn{
    display:inline-block;
    background:linear-gradient(135deg, var(--volt-deep), var(--volt));
    color:#04141a;
    padding:11px 24px;
    text-decoration:none;
    border-radius:var(--radius-sm);
    font-weight:700;
    font-size:1.02rem;
    text-transform:uppercase;
    letter-spacing:0.04em;
    border:none;
    cursor:pointer;
    width:100%;
    position:relative;
    overflow:hidden;
    transition:filter 0.2s, box-shadow 0.2s, transform 0.2s;
  }
  .btn:hover{ box-shadow:0 0 14px rgba(57,225,255,0.4); filter:brightness(1.1); transform:translateY(-1px); }
  .btn:active{ transform:translateY(0) scale(0.98); }

  .yt-card{ border-color:rgba(255,182,39,0.18); }
  .yt-card .price{ color:var(--amber); }
  .yt-card ul li i{ color:var(--amber); }
  .yt-perk{
    margin-top:18px;
    font-size:0.98rem;
    font-weight:700;
    color:var(--text);
    border-top:1px solid var(--edge);
    padding-top:16px;
  }
  .yt-note{
    text-align:center;
    margin-top:8px;
    color:var(--text-dim);
    font-size:1.02rem;
  }

  /* --- RULES --- */
  .rule-list{ list-style:none; display:flex; flex-direction:column; gap:12px; }
  .rule-list li{
    background:var(--panel);
    border:1px solid var(--edge);
    border-left:3px solid var(--volt);
    padding:16px 20px;
    border-radius:var(--radius-sm);
    display:flex;
    gap:16px;
    align-items:flex-start;
    font-size:1.05rem;
    transition:transform 0.2s ease, border-color 0.2s;
  }
  .rule-list li:hover{
    transform:translateX(4px);
    border-color:rgba(57,225,255,0.3);
  }
  .rule-list .tag{
    font-family:'JetBrains Mono',monospace;
    font-size:0.78rem;
    color:var(--volt);
    background:rgba(57,225,255,0.08);
    border:1px solid rgba(57,225,255,0.2);
    padding:4px 8px;
    border-radius:6px;
    white-space:nowrap;
    margin-top:2px;
  }
  .rule-list strong{ color:#fff; }

  /* --- INFO --- */
  .info-box{
    background:var(--panel);
    border:1px solid var(--edge);
    padding:26px 28px;
    border-radius:var(--radius);
    margin-bottom:18px;
    font-size:1.08rem;
    transition:transform 0.2s ease, border-color 0.2s;
  }
  .info-box:hover{ transform:translateY(-2px); border-color:rgba(57,225,255,0.25); }
  .info-box h3{
    color:#fff;
    margin-bottom:10px;
    font-size:1.25rem;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .info-box h3 i{ color:var(--volt); }
  .info-box strong{ color:var(--volt); }

  /* --- CREATOR CARD --- */
  .creator-card{
    background:var(--panel);
    border:1px solid var(--edge);
    border-radius:var(--radius);
    padding:28px;
    display:flex;
    gap:24px;
    align-items:center;
    flex-wrap:wrap;
  }

  .creator-head{
    flex-shrink:0;
    width:88px;
    height:88px;
    border:2px solid var(--volt);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 0 12px rgba(57,225,255,0.2);
    background:var(--panel-2);
    transition:transform 0.25s ease;
  }
  .creator-card:hover .creator-head{
    transform:scale(1.04) rotate(-1deg);
  }
  .creator-head img{
    width:100%;
    height:100%;
    image-rendering:pixelated;
    image-rendering:-moz-crisp-edges;
    display:block;
  }

  .creator-info{ flex:1; min-width:220px; }

  .creator-tag{
    font-size:0.78rem;
    color:var(--volt);
    letter-spacing:0.1em;
    text-transform:uppercase;
  }

  .creator-info h3{
    color:#fff;
    font-size:1.4rem;
    margin:6px 0 12px;
    display:flex;
    align-items:center;
    gap:8px;
  }

  .creator-line{
    font-size:1.02rem;
    color:var(--text-dim);
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:8px;
  }
  .creator-line i{ color:var(--volt); width:16px; text-align:center; }
  .creator-line a{ color:var(--text); text-decoration:none; }
  .creator-line a:hover{ color:var(--volt); text-decoration:underline; }

  .creator-note{
    font-size:0.88rem;
    color:var(--text-dim);
    opacity:0.75;
    margin-top:10px;
  }

  .deco{ font-size:0.85em; }

  /* --- DISCORD --- */
  .discord-sec{
    text-align:center;
    background:var(--panel);
    border:1px solid var(--edge);
    padding:50px 30px;
    border-radius:var(--radius);
    margin-top:20px;
    position:relative;
    overflow:hidden;
  }
  .discord-sec::before{
    content:"";
    position:absolute;
    inset:0;
    background:radial-gradient(circle at 50% 0%, rgba(114,137,218,0.1), transparent 60%);
  }
  .discord-sec h3{
    font-size:1.7rem;
    color:#fff;
    margin-bottom:14px;
    position:relative;
  }
  .discord-sec h3 i{
    display:inline-block;
    will-change:transform;
    animation:icon-float 3s ease-in-out infinite;
  }
  @keyframes icon-float{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-4px); }
  }
  .discord-sec p{
    margin-bottom:24px;
    font-size:1.08rem;
    color:var(--text-dim);
    position:relative;
  }
  .btn-discord{
    background:#5865F2;
    color:#fff;
    display:inline-flex;
    align-items:center;
    gap:10px;
    width:auto;
    padding:13px 30px;
    position:relative;
    border-radius:var(--radius-sm);
  }
  .btn-discord:hover{ box-shadow:0 0 14px rgba(88,101,242,0.4); }

  footer{
    text-align:center;
    padding:36px 20px;
    background:#04060a;
    border-top:1px solid var(--edge);
    font-size:1rem;
    color:var(--text-dim);
  }
  footer p:last-child{ font-size:0.85rem; color:#445164; margin-top:6px; }

  /* --- TOAST / MODAL --- */
  .toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--panel);
    border:1px solid var(--volt);
    color:var(--text);
    padding:14px 22px;
    border-radius:var(--radius);
    font-size:1rem;
    display:flex;
    align-items:center;
    gap:14px;
    box-shadow:0 10px 30px rgba(0,0,0,0.7);
    opacity:0;
    pointer-events:none;
    transition:opacity 0.25s, transform 0.25s;
    z-index:2000;
    max-width:90vw;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }
  .toast a{
    color:var(--volt);
    font-weight:700;
    text-decoration:none;
    white-space:nowrap;
  }
  .toast a:hover{ text-decoration:underline; }

  .admin-link{
    background:none;
    border:1px solid var(--edge);
    color:var(--text-dim);
    font-family:'JetBrains Mono',monospace;
    font-size:0.85rem;
    padding:8px 16px;
    border-radius:999px;
    cursor:pointer;
    margin-top:14px;
    transition:color 0.25s, border-color 0.25s;
  }
  .admin-link:hover{ color:var(--volt); border-color:rgba(57,225,255,0.4); }

  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(2,4,8,0.85);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:3000;
    opacity:0;
    transition:opacity 0.2s ease;
  }
  .modal-overlay.show{ opacity:1; display:flex; }

  .modal-box{
    position:relative;
    background:var(--panel);
    border:1px solid var(--edge);
    border-radius:var(--radius);
    padding:32px 28px;
    width:100%;
    max-width:380px;
    box-shadow:0 20px 50px rgba(0,0,0,0.8);
    transform:translateY(10px);
    transition:transform 0.2s ease;
  }
  .modal-overlay.show .modal-box{ transform:translateY(0); }

  .modal-close{
    position:absolute;
    top:12px;
    right:14px;
    background:none;
    border:none;
    color:var(--text-dim);
    font-size:1.4rem;
    line-height:1;
    cursor:pointer;
    transition:color 0.2s;
  }
  .modal-close:hover{ color:var(--volt); }

  .modal-box h3{
    color:#fff;
    font-size:1.3rem;
    margin-bottom:20px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .modal-box h3 i{ color:var(--volt); }

  .admin-input{
    width:100%;
    background:var(--panel-2);
    border:1px solid var(--edge);
    color:var(--text);
    font-family:'Rajdhani',sans-serif;
    font-size:1rem;
    padding:12px 14px;
    border-radius:var(--radius-sm);
    margin-bottom:14px;
    transition:border-color 0.25s;
  }
  .admin-input:focus{ outline:none; border-color:var(--volt); }

  .login-error{
    color:#ff6464;
    font-size:0.9rem;
    margin:-4px 0 12px;
    min-height:1.1em;
  }

  .stat-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:14px;
    margin-bottom:20px;
  }
  .stat-card{
    background:var(--panel-2);
    border:1px solid var(--edge);
    border-radius:var(--radius-sm);
    padding:18px;
    text-align:center;
  }
  .stat-num{
    display:block;
    font-family:'JetBrains Mono',monospace;
    font-size:2.2rem;
    font-weight:700;
    color:var(--volt);
  }
  .stat-label{
    font-size:0.85rem;
    color:var(--text-dim);
  }

  .admin-note{
    font-size:0.88rem;
    color:var(--text-dim);
    background:rgba(255,182,39,0.06);
    border:1px solid rgba(255,182,39,0.2);
    border-radius:var(--radius-sm);
    padding:12px 14px;
    margin-bottom:18px;
    line-height:1.45;
  }
